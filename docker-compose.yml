services:
  database:
    image: mariadb:10.5
    restart: always
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - database_data:/var/lib/mysql
    env_file:
      - .env

  cache:
    image: redis:alpine
    restart: always
    env_file:
      - .env

  panel:
    image: ghcr.io/dank1775/pterodactyl-custom:latest
    restart: always
    ports:
      - "${PANEL_PORT_HTTP:-80}:80"
      #- "${PANEL_PORT_HTTPS:-443}:443" este el para https pero como dokploy ya lo maneja lo quite
    links:
      - database
      - cache
    volumes:
      - panel_var:/app/var/
      - panel_logs:/app/storage/logs
    env_file:
      - .env

volumes:
  database_data:
  panel_var:
  panel_logs:

